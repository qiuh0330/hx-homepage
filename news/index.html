<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新闻动态 - 核信生物</title>
    <meta name="description" content="核信生物最新动态与新闻，了解公司在再生医学、干细胞治疗与基因合成领域的最新进展。">
    <link rel="icon" type="image/png" href="../logo.png">
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@alleyway-boop/fonts@1.0.0/css/index.css">
    <style>
        .news-list-page {
            padding: 120px 0 80px;
            background: linear-gradient(180deg, var(--bg-dark) 0%, #080f1a 100%);
            min-height: 100vh;
        }
        .news-list-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 24px;
        }
        .news-list-header {
            margin-bottom: 48px;
            text-align: center;
        }
        .news-list-header h1 {
            font-size: clamp(1.6rem, 4vw, 2.4rem);
            font-weight: 800;
            color: var(--text);
            margin-bottom: 12px;
        }
        .news-list-header p {
            font-size: 1rem;
            color: var(--text-muted);
        }
        .news-list-item {
            display: flex;
            gap: 28px;
            padding: 28px 0;
            border-bottom: 1px solid var(--border-light);
            text-decoration: none;
            transition: var(--transition);
        }
        .news-list-item:hover {
            border-color: rgba(0, 201, 167, 0.3);
        }
        .news-list-item:hover .news-list-title {
            color: var(--accent);
        }
        .news-list-date {
            flex-shrink: 0;
            width: 90px;
            text-align: center;
            padding-top: 4px;
        }
        .news-list-date .day {
            display: block;
            font-size: 2rem;
            font-weight: 900;
            color: var(--accent);
            line-height: 1;
        }
        .news-list-date .month-year {
            display: block;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 4px;
            letter-spacing: 1px;
        }
        .news-list-content {
            flex: 1;
        }
        .news-list-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 8px;
            transition: color 0.2s ease;
        }
        .news-list-desc {
            font-size: 0.95rem;
            color: var(--text-muted);
            line-height: 1.7;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .news-list-empty {
            text-align: center;
            padding: 60px 0;
            color: var(--text-muted);
        }
        @media (max-width: 768px) {
            .news-list-item {
                flex-direction: column;
                gap: 8px;
            }
            .news-list-date {
                width: auto;
                text-align: left;
                display: flex;
                align-items: baseline;
                gap: 8px;
            }
            .news-list-date .day {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body data-page="about">
    <!-- 导航栏 -->
    <div id="navbar-placeholder"></div>

    <section class="news-list-page">
        <div class="news-list-container">
            <div class="news-list-header">
                <h1>新闻动态</h1>
                <p>了解核信生物在再生医学领域的最新进展</p>
            </div>

            <a href="news-1.html" class="news-list-item">
                <div class="news-list-date">
                    <span class="day">07</span>
                    <span class="month-year">2026.01</span>
                </div>
                <div class="news-list-content">
                    <h3 class="news-list-title">核信生物新场地奠基开工，加速干细胞GMP产能建设</h3>
                    <p class="news-list-desc">核信生物新场地在合肥高新区国家健康大数据产业园C1栋4楼正式奠基开工，将建设干细胞制剂GMP车间及高通量基因合成实验室，标志着公司从研发阶段向产业化迈出关键一步。</p>
                </div>
            </a>

            <div class="news-list-empty">
                <p>更多新闻动态，敬请期待。</p>
            </div>
        </div>
    </section>

    <!-- 页脚 -->
    <div id="footer-placeholder"></div>

    <script src="../script.js"></script>
</body>
</html>
